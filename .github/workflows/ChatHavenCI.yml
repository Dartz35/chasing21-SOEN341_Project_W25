name: ChatHaven CI

on:
  push:
    branches:
      - main
      - CI-Pipeline
  pull_request:
    branches:
      - main
      - CI-Pipeline

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install jsdom --save-dev

      - name: Ensure results folder exists
        run: mkdir -p results

      - name: Run All CSS Tests
        run: |
          for test in test/testCases/*.js; do
            echo "Running test: $test"
            node "$test" || exit 1
          done

      - name: Display Test Results in Logs
        run: cat test/results/*.log || echo "No test results found."

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add test/results/*.log
          git commit -m "CI: Update test results" || echo "No changes to commit."
          git push origin CI-Pipeline || echo "No changes to push."
