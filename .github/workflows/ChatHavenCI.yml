name: ChatHaven CI

on:
  push:
    branches:
      - main
      - CI-Pipeline
  pull_request:
    branches:
      - main
      - CI-Pipeline

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install jsdom --save-dev

      - name: Ensure results folder exists
        run: mkdir -p results

      - name: Run All CSS Tests
        run: |
          for test in test/testCases/*.js; do
            echo "Running test: $test"
            node "$test" || exit 1
          done

      - name: "Debug: List All Files"
        run: ls -R

      - name: Display Test Results in Logs
        run: cat results/*.log || echo "⚠️ No test results found."

      - name: Upload Test Results as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSS-Test-Results
          path: results/
